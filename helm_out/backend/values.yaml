replicaCount: 1

image:
  repository: cr.yandex/crpt9bdjmglbhc0e3eis/backend
  tag: 5f9eb61614c023b7e9ee2d7b9b3f292baba71043
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

postgres:
  host: postgres
  port: 5432
  database: task_manager
  username: postgres
  password: postgres

ingress:
  enabled: true
  className: nginx
  host: api.task-manager.local
  path: /
  pathType: Prefix

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 15

monitoring:
  enabled: true
  releaseLabel: monitoring
  path: /actuator/prometheus