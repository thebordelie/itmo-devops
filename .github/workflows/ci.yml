name: Monorepo CI

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - main
      - master

env:
  REGISTRY: cr.yandex
  REGISTRY_ID: crpt9bdjmglbhc0e3eis
  BACKEND_IMAGE: backend
  FRONTEND_IMAGE: frontend

jobs:
  backend-test:
    name: Backend - Test
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Run tests
        run: ./gradlew test

  backend-build:
    name: Backend - Build
    runs-on: ubuntu-latest
    needs: backend-test

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Build without tests
        run: ./gradlew clean build -x test
      
      - name: Build backend Docker image
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.REGISTRY_ID }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.REGISTRY_ID }}/${{ env.BACKEND_IMAGE }}:latest \
            .

      - name: Save backend Docker image
        run: |
          docker save \
            ${{ env.REGISTRY }}/${{ env.REGISTRY_ID }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            ${{ env.REGISTRY }}/${{ env.REGISTRY_ID }}/${{ env.BACKEND_IMAGE }}:latest \
            -o /tmp/backend-image.tar

      - name: Upload backend Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-image
          path: /tmp/backend-image.tar
          retention-days: 1

  frontend-test:
    name: Frontend - Test
    runs-on: ubuntu-latest
    needs: backend-build

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Test
        run: npm run test

  frontend-build:
    name: Frontend - Build
    runs-on: ubuntu-latest
    needs: frontend-test

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Build frontend Docker image
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.REGISTRY_ID }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.REGISTRY_ID }}/${{ env.FRONTEND_IMAGE }}:latest \
            .

      - name: Save frontend Docker image
        run: |
          docker save \
            ${{ env.REGISTRY }}/${{ env.REGISTRY_ID }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
            ${{ env.REGISTRY }}/${{ env.REGISTRY_ID }}/${{ env.FRONTEND_IMAGE }}:latest \
            -o /tmp/frontend-image.tar

      - name: Upload frontend Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-image
          path: /tmp/frontend-image.tar
          retention-days: 1
  sonar-scan:
      runs-on: [self-hosted, k8s, minikube]

      steps:
        - name: Checkout
          uses: actions/checkout@v4
          with:
            fetch-depth: 0

        - name: Set up JDK
          uses: actions/setup-java@v4
          with:
            distribution: temurin
            java-version: 21

        - name: Set up Node.js
          uses: actions/setup-node@v4
          with:
            node-version: 20
        
        - name: chmod
          run: chmod +x backend/gradlew

        - name: Backend tests with coverage
          run: |
            cd backend
            ./gradlew test jacocoTestReport

        - name: Frontend tests with coverage
          run: |
            cd frontend
            npm ci
            npm run test -- --coverage

        - name: SonarQube Scan
          uses: SonarSource/sonarqube-scan-action@v7
          env:
            SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
            SONAR_HOST_URL: http://sonarqube-sonarqube.sonarqube:9000
          with:
            args: >
              -Dsonar.projectKey=itmo-devops
              -Dsonar.projectName=itmo-devops
              -Dsonar.sources=backend/src/main,frontend/src
              -Dsonar.tests=backend/src/test,frontend/tests
              -Dsonar.exclusions=**/node_modules/**,**/build/**,**/dist/**,**/.gradle/**
              -Dsonar.coverage.jacoco.xmlReportPaths=backend/build/reports/jacoco/test/jacocoTestReport.xml
              -Dsonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
              -Dsonar.qualitygate.wait=true
              -Dsonar.qualitygate.timeout=300

  docker-push:
    name: Docker - Push Images
    runs-on: ubuntu-latest
    needs:
      - backend-build
      - frontend-build
      - sonar-scan

    steps:
      - name: Download backend Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-image
          path: /tmp

      - name: Download frontend Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-image
          path: /tmp

      - name: Load backend Docker image
        run: docker load -i /tmp/backend-image.tar

      - name: Load frontend Docker image
        run: docker load -i /tmp/frontend-image.tar

      - name: Login to Yandex Container Registry
        uses: docker/login-action@v3
        with:
          registry: cr.yandex
          username: oauth
          password: ${{ secrets.OAUTH }}

      - name: Push backend image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.REGISTRY_ID }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.REGISTRY_ID }}/${{ env.BACKEND_IMAGE }}:latest

      - name: Push frontend image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.REGISTRY_ID }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.REGISTRY_ID }}/${{ env.FRONTEND_IMAGE }}:latest
